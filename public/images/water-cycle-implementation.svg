<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Simple water cycle lesson implementation</title>
  <desc id="desc">A calm illustration showing lesson steps from connect and explain through practice, apply, feedback, reflection, and final output.</desc>
  <rect width="1200" height="720" fill="#FFFBF5"/>
  <rect x="92" y="92" width="1016" height="536" rx="34" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="4"/>
  <rect x="152" y="150" width="430" height="322" rx="22" fill="#F5F1E8" stroke="#E5E7EB" stroke-width="3"/>
  <rect x="188" y="186" width="358" height="48" rx="10" fill="#0F766E"/>
  <text x="216" y="217" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Water Cycle LXD Lesson</text>
  <circle cx="252" cy="330" r="50" fill="#F59E0B"/>
  <path d="M324 348c36-64 116-94 188-70 60 20 98 72 104 133" fill="none" stroke="#0F766E" stroke-width="15" stroke-linecap="round"/>
  <path d="M606 410l30-14-6 33" fill="none" stroke="#0F766E" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M506 440c-60 34-136 30-192-10" fill="none" stroke="#115E59" stroke-width="15" stroke-linecap="round"/>
  <path d="M316 430l13 32-34-6" fill="none" stroke="#115E59" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="190" y="532" fill="#1F2937" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">From plan to classroom output</text>
  <text x="190" y="568" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="20">Use slides as support, not the whole lesson.</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(658 160)">
      <rect width="360" height="58" rx="16" fill="#ECFDF5" stroke="#99F6E4" stroke-width="3"/>
      <circle cx="32" cy="29" r="13" fill="#0F766E"/>
      <text x="62" y="37" fill="#1F2937" font-size="21" font-weight="700">1. Connect with a familiar example</text>
    </g>
    <g transform="translate(682 240)">
      <rect width="360" height="58" rx="16" fill="#FFFBEB" stroke="#FCD34D" stroke-width="3"/>
      <circle cx="32" cy="29" r="13" fill="#F59E0B"/>
      <text x="62" y="37" fill="#1F2937" font-size="21" font-weight="700">2. Ask students to predict</text>
    </g>
    <g transform="translate(658 320)">
      <rect width="360" height="58" rx="16" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="3"/>
      <circle cx="32" cy="29" r="13" fill="#64748B"/>
      <text x="62" y="37" fill="#1F2937" font-size="21" font-weight="700">3. Practice with stage cards</text>
    </g>
    <g transform="translate(682 400)">
      <rect width="360" height="58" rx="16" fill="#ECFDF5" stroke="#99F6E4" stroke-width="3"/>
      <circle cx="32" cy="29" r="13" fill="#115E59"/>
      <text x="62" y="37" fill="#1F2937" font-size="21" font-weight="700">4. Apply, revise, and reflect</text>
    </g>
    <g transform="translate(718 500)">
      <rect width="284" height="78" rx="18" fill="#0F766E"/>
      <text x="44" y="46" fill="#FFFFFF" font-size="22" font-weight="800">Final Canva output</text>
    </g>
  </g>
  <path d="M584 308c46-10 66-56 116-74" fill="none" stroke="#0F766E" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12"/>
  <path d="M584 398c52 26 78 76 144 98" fill="none" stroke="#F59E0B" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12"/>
